<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
</head>
<body>

    <h1>Control Estudiantil</h1>

    <form method="POST">

        {{ form.hidden_tag() }}

        <p>
            {{ form.correo.label }}
            {{ form.correo() }}
        </p>

        <p>
            {{ form.password.label }}
            {{ form.password() }}
        </p>

        <p>
            {{ form.submit() }}
        </p>

    </form>

</body>
</html>
